name: CI

on:
  push:
    branches:
      - main
      - "stage/**"
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Type check
        id: typecheck
        continue-on-error: true
        run: npm run typecheck > typecheck.log 2>&1

      - name: Upload typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log

      - name: Fail on typecheck error
        if: steps.typecheck.outcome == 'failure'
        run: |
          cat typecheck.log
          exit 1

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

  rust-format:
    name: Rust formatting
    runs-on: ubuntu-latest
    steps:
      - name: Fetch current commit and check rustfmt
        shell: bash
        run: |
          git init -q .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth=1 origin "${GITHUB_SHA}"
          git checkout -q FETCH_HEAD
          rustup component add rustfmt >/dev/null
          cd src-tauri
          cargo fmt --all -- --check

  rust-runtime:
    name: Rust runtime tests
    runs-on: ubuntu-22.04
    steps:
      - name: Fetch, prepare and test runtime
        shell: bash
        run: |
          git init -q .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth=1 origin "${GITHUB_SHA}"
          git checkout -q FETCH_HEAD
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
            libwebkit2gtk-4.1-dev \
            build-essential \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev >/dev/null
          cd src-tauri
          cargo test --all-targets -q
