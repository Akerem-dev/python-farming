name: One-time Stage 21 PR patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'stage/21-intermediate-testing' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: stage/21-intermediate-testing

      - name: Apply test laboratory integration
        run: python scripts/stage21_patch.py

      - name: Commit integration changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/features/curriculum/services/curriculumService.ts src/pages/WorkspacePage/WorkspacePage.tsx
          git commit -m "feat: integrate test laboratory mode"
          git push origin HEAD:stage/21-intermediate-testing
