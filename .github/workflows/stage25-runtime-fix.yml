name: Stage 25 Runtime Fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: python scripts/stage25_runtime_fix.py
      - run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/features/learning/services/advancedPatternTaskValidationService.ts
          git commit -m "fix: align advanced validator runtime protocol"
          git push origin HEAD:${{ github.head_ref }}
