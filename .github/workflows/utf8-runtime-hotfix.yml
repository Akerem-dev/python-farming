name: Apply UTF-8 runtime hotfix

on:
  push:
    branches:
      - stage/04-task-validation

permissions:
  contents: write

jobs:
  patch-runtime:
    if: ${{ !contains(github.event.head_commit.message, '[skip utf8 patch]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: stage/04-task-validation
          fetch-depth: 0

      - name: Force Python UTF-8 mode
        shell: python
        run: |
          from pathlib import Path

          path = Path("src-tauri/src/commands/runtime.rs")
          content = path.read_text(encoding="utf-8")
          before = '        .arg("-I")\n        .arg("-B")'
          after = '        .arg("-I")\n        .arg("-X")\n        .arg("utf8")\n        .arg("-B")'

          if after not in content:
              if before not in content:
                  raise SystemExit("Python command argument block was not found.")
              path.write_text(content.replace(before, after, 1), encoding="utf-8")

      - name: Commit hotfix
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src-tauri/src/commands/runtime.rs
          git commit -m "fix: force UTF-8 Python output [skip utf8 patch]"
          git push origin stage/04-task-validation
