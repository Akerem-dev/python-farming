name: Stage 26 Validation

on:
  push:
    branches: [stage/26-advanced-asyncio]

permissions:
  contents: write

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  rust-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup component add rustfmt
      - run: cd src-tauri && cargo fmt --all -- --check

  rust-runtime:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
            libwebkit2gtk-4.1-dev \
            build-essential \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev >/dev/null
      - run: cd src-tauri && cargo test --all-targets -q

  record-success:
    needs: [frontend, rust-format, rust-runtime]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: stage/26-advanced-asyncio
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Record validated commit
        run: |
          printf 'validated_sha=%s\nvalidated_at=%s\n' "${{ github.sha }}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > .stage26-validation-passed
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .stage26-validation-passed
          git commit -m "chore: record stage 26 validation"
          git push origin HEAD:stage/26-advanced-asyncio
