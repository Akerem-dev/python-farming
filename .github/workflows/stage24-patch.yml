name: Stage 24 Patch

on:
  push:
    branches:
      - stage/24-intermediate-capstone

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply deterministic patch
        run: python scripts/stage24_patch.py
      - name: Commit patched product files
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/features/curriculum/services/curriculumService.ts src/pages/HomePage/HomePage.tsx
          git commit -m "feat: wire intermediate graduation experience"
          git push
