name: Stage 25 Patch

on:
  push:
    branches:
      - stage/25-advanced-decorators-context-managers

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply deterministic patch
        run: python scripts/stage25_patch.py
      - name: Commit patched product files
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/content/curriculum.json public/content/modules/decorators-context-managers.json src/features/learning/taskValidationTypes.ts src/features/learning/store/taskValidationStore.ts src/features/learning/services/advancedPatternTaskValidationService.ts src/pages/HomePage/HomePage.tsx
          git commit -m "feat: wire advanced curriculum and pattern validation"
          git push
