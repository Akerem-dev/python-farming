name: Stage 25 Patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply deterministic patch
        run: python scripts/stage25_patch.py
      - name: Commit patched product files
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/content/curriculum.json public/content/module-packages.json src/features/learning/taskValidationTypes.ts src/features/learning/store/taskValidationStore.ts src/pages/HomePage/HomePage.tsx
          git commit -m "feat: wire advanced decorator curriculum"
          git push origin HEAD:${{ github.head_ref }}
