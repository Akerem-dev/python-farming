name: Stage 27 integration patch

on:
  pull_request:
    branches: [main]
    paths:
      - "scripts/stage27_patch.py"
      - ".github/workflows/stage27-patch.yml"

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'stage/27-advanced-async-await'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply deterministic patch
        run: python scripts/stage27_patch.py
      - name: Commit integration changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/features/learning/taskValidationTypes.ts \
                  src/features/learning/store/taskValidationStore.ts \
                  public/content/module-packages.json
          if git diff --cached --quiet; then
            echo "No patch changes needed."
          else
            git commit -m "feat(async): connect validator and curriculum package"
            git push origin HEAD:${{ github.head_ref }}
          fi
