name: Stage 26 Patch

on:
  push:
    branches: [stage/26-advanced-asyncio]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: stage/26-advanced-asyncio
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/stage26_patch.py
      - name: Commit generated product changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No patch changes"
          else
            git commit -m "feat: integrate asyncio validation pipeline"
            git push origin HEAD:stage/26-advanced-asyncio
          fi
