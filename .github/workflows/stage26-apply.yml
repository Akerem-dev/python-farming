name: Stage 26 Apply

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Decode Stage 26 product files
        run: python scripts/stage26_apply.py
      - name: Commit product files
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/content/module-packages.json public/content/modules/generators-coroutines.json src/features/learning/services/advancedPatternTaskValidationService.ts src/test/content/generatorsCoroutinesContent.test.ts src/test/integration/generatorValidator.integration.test.ts
          git commit -m "feat: add generator and coroutine curriculum"
          git push origin HEAD:${{ github.head_ref }}
