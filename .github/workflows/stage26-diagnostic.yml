name: Stage 26 Diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Capture test tail
        shell: bash
        run: |
          set +e
          npm test > /tmp/stage26-test.log 2>&1
          status=$?
          tail -n 180 /tmp/stage26-test.log > stage26-diagnostic.txt
          echo "EXIT_STATUS=$status" >> stage26-diagnostic.txt
          exit 0
      - name: Commit diagnostic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stage26-diagnostic.txt
          git commit -m "chore: capture stage 26 diagnostic"
          git push origin HEAD:${{ github.head_ref }}
