name: Stage 26 Curriculum Fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Add final project transformation guide
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("public/content/modules/generators-coroutines.json")
          package = json.loads(path.read_text(encoding="utf-8"))
          lesson = next(
              item
              for item in package["lessons"]
              if item["id"] == "advanced.generators.final-pipeline"
          )
          lesson["dataTransformation"] = {
              "projectTitle": "Lazy Satış İşleme Hattı",
              "sourceShape": "[{tutar, kategori, gecerli}, ...]",
              "targetShape": "{satis_sayisi, toplam, kategoriler}",
              "deliverables": [
                  "yield from kullanan satış kaynağı",
                  "Lazy filtre ve normalizasyon generator aşamaları",
                  "send() ile veri alan rapor coroutine'i",
                  "Tek geçişli servis ve kalıcı akış günlüğü",
              ],
              "rules": [
                  "Kaynak satış koleksiyonu değiştirilmemelidir.",
                  "Filtre ve dönüşüm aşamalarında ara satış listesi oluşturulmamalıdır.",
                  "Coroutine next() ile hazırlanmalı ve iş bitince close() ile kapatılmalıdır.",
                  "Boş ve farklı eşikli akışlar sözleşmeye uygun rapor döndürmelidir.",
              ],
              "workflow": [
                  "satis_kaynagi ile kaynak iterable'ı yield from üzerinden aktar.",
                  "gecerli_satislar ile yalnız geçerli ve eşik üstü kayıtları yield et.",
                  "normalize_satis ile sink'in beklediği alanları lazy biçimde üret.",
                  "rapor_toplayici coroutine'ini hazırla, kayıtları send et ve sonucu tek geçişte döndür.",
              ],
          }
          path.write_text(
              json.dumps(package, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
      - name: Remove temporary diagnostics and commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm --ignore-unmatch .github/workflows/stage26-diagnostic.yml stage26-diagnostic.txt
          git add public/content/modules/generators-coroutines.json
          git commit -m "fix: add generator final transformation guide"
          git push origin HEAD:${{ github.head_ref }}
